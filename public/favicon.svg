<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0" stop-color="#101013"/>
      <stop offset="1" stop-color="#08080a"/>
    </radialGradient>
    <linearGradient id="nr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c5c64"/>
      <stop offset=".34" stop-color="#4a4a51"/>
      <stop offset=".66" stop-color="#363639"/>
      <stop offset="1" stop-color="#262629"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="32" height="32" fill="url(#bg)"/>
  <text x="16" y="16.5" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Narrow','Roboto Condensed',system-ui,sans-serif"
        font-weight="800" font-size="22" letter-spacing="-2.4"
        textLength="22" lengthAdjust="spacing" fill="url(#nr)">NR</text>
  <rect width="32" height="32" filter="url(#grain)" opacity="0.07" style="mix-blend-mode:overlay"/>
</svg>
